<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QMA — Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>

    <!-- Background Blobs -->
    <div class="blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- Toast -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- App Shell -->
    <div class="app-container">

        <!-- ── Sidebar ── -->
        <aside class="sidebar glass">
            <div class="logo">
                <i class="ph-fill ph-intersect-three"></i>
                <span>QMA</span>
            </div>

            <ul class="nav-menu">
                <li class="nav-item active" id="navDashboard">
                    <i class="ph ph-squares-four"></i>
                    <span>Dashboard</span>
                </li>
                <li class="nav-item" id="navHistory">
                    <i class="ph ph-clock-counter-clockwise"></i>
                    <span>History</span>
                </li>
                <li class="nav-item logout-btn" id="logoutBtn">
                    <i class="ph ph-sign-out"></i>
                    <span>Logout</span>
                </li>
            </ul>
        </aside>

        <!-- ── Main Content ── -->
        <main class="main-content">

            <!-- Header -->
            <header class="header glass">
                <h1 class="page-title" id="pageTitle">Measurement Engine</h1>
                <div class="header-actions">
                    <button class="theme-toggle" id="themeToggleBtn">
                        <i class="ph theme-icon"></i>
                    </button>
                    <div class="user-profile">
                        <div class="user-info">
                            <span class="user-name"  id="headerUserName">User</span>
                            <span class="user-email" id="headerUserEmail"></span>
                        </div>
                        <div class="avatar" id="headerAvatar">U</div>
                    </div>
                </div>
            </header>

            <!-- ══ Calculator View ══ -->
            <div id="calculatorView" style="display:flex;flex-direction:column;gap:1.5rem;">

                <section class="panel glass">

                    <!-- Operation Tabs -->
                    <div class="input-group">
                        <label>Operation</label>
                        <div class="op-tabs" id="opTabs">
                            <button class="op-tab active" data-op="ADD">➕ Add</button>
                            <button class="op-tab"        data-op="SUBTRACT">➖ Subtract</button>
                            <button class="op-tab"        data-op="DIVIDE">➗ Divide</button>
                            <button class="op-tab"        data-op="COMPARE">⚖️ Compare</button>
                            <button class="op-tab"        data-op="CONVERT">🔄 Convert</button>
                        </div>
                    </div>

                    <!-- Temperature Warning -->
                    <div class="temp-warning" id="tempWarning">
                        <i class="ph ph-warning"></i>
                        Temperature only supports <strong>&nbsp;Compare&nbsp;</strong> and <strong>&nbsp;Convert&nbsp;</strong>.
                    </div>

                    <!-- Category + Convert-To -->
                    <div class="form-row">
                        <div class="input-group">
                            <label for="measureType">Measurement Category</label>
                            <div class="input-wrapper">
                                <i class="ph ph-ruler"></i>
                                <select id="measureType">
                                    <option value="LENGTH">Length</option>
                                    <option value="WEIGHT">Weight / Mass</option>
                                    <option value="VOLUME">Volume</option>
                                    <option value="TEMPERATURE">Temperature</option>
                                </select>
                            </div>
                        </div>

                        <div class="input-group" id="targetUnitGroup" style="display:none;">
                            <label for="targetUnitSelect">Convert To</label>
                            <div class="input-wrapper">
                                <i class="ph ph-arrows-left-right"></i>
                                <select id="targetUnitSelect"></select>
                            </div>
                        </div>
                    </div>

                    <!-- Value 1 -->
                    <div class="input-group">
                        <label>First Value</label>
                        <div class="combo-input" id="combo1">
                            <input type="number" id="value1" placeholder="Enter value…" step="any">
                            <select id="unit1"></select>
                        </div>
                    </div>

                    <!-- Value 2 -->
                    <div class="input-group" id="value2Group">
                        <label>Second Value</label>
                        <div class="combo-input" id="combo2">
                            <input type="number" id="value2" placeholder="Enter value…" step="any">
                            <select id="unit2"></select>
                        </div>
                    </div>

                    <button class="btn-primary" id="calculateBtn">
                        <i class="ph ph-calculator"></i> Calculate
                    </button>
                </section>

                <!-- Result -->
                <section class="result-panel glass" id="resultPanel">
                    <div class="success-glow"></div>
                    <div class="result-content">
                        <span class="result-label" id="resultLabel">Result</span>
                        <div class="result-value">
                            <span id="resultValue">—</span>
                            <span class="result-unit" id="resultUnitDisplay"></span>
                        </div>
                        <div class="result-sub" id="resultSub"></div>
                    </div>
                    <i class="ph-fill ph-check-circle result-icon" id="resultIcon"></i>
                </section>
            </div>

            <!-- ══ History View ══ -->
            <div id="historyView" style="display:none;">
                <section class="history-panel glass">
                    <div class="history-header">
                        <span class="history-title">Operation History</span>
                        <div class="history-filter">
                            <button class="history-btn active" data-op="ADD">Add</button>
                            <button class="history-btn"        data-op="SUBTRACT">Subtract</button>
                            <button class="history-btn"        data-op="DIVIDE">Divide</button>
                            <button class="history-btn"        data-op="COMPARE">Compare</button>
                            <button class="history-btn"        data-op="CONVERT">Convert</button>
                        </div>
                    </div>
                    <div class="history-table-wrap" id="historyTableWrap">
                        <div class="empty-history">Select an operation to load history.</div>
                    </div>
                </section>
            </div>

        </main>
    </div>

    <!-- Load shared utilities first, then dashboard logic -->
    <script src="auth.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
